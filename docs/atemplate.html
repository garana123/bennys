<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suchbares Dropdown</title>
  
  <!-- Select2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/css/select2.min.css" rel="stylesheet" />

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
  <!-- Select2 JS -->
  <script src="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/js/select2.min.js"></script>
  <link rel="stylesheet" href="mitarbeiter_log-in.css">
  <link rel="stylesheet" href="mitarbeiter_1.css">
  <script>
    // Prüfen, ob der Nutzer eingeloggt ist
    if (sessionStorage.getItem("loggedin") !== "true") {
        window.location.href = "mitarbeiter_log-in.html"; // Umleitung zur Login-Seite
    }

    function logout() {
        sessionStorage.removeItem("loggedin"); 
        sessionStorage.removeItem("user"); 
        window.location.href = "mitarbeiter_log-in.html"; // Zurück zur Login-Seite
    }
  </script>
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

  
  <!-- In mitarbeiter_1.html direkt nach <body> -->
  <h1 class="price-title">Preisliste</h1>
  <div class="layout">
  <div class="left-column">

    <div class="selection-container">
      <label class="main-option-item">
        <input type="checkbox" class="check-box main-option" onclick="onlyOne(this)">
        <span class="checkmark"></span>
        Vanilla
      </label>
      <label class="main-option-item">
        <input type="checkbox" class="check-box main-option" onclick="onlyOne(this)">
        <span class="checkmark"></span>
        Import
      </label>
      <label class="main-option-item">
        <input type="checkbox" class="check-box main-option" onclick="onlyOne(this)">
        <span class="checkmark"></span>
        Motorrad/Quad
      </label>
      <label class="main-option-item">
        <input type="checkbox" class="check-box main-option" onclick="onlyOne(this)">
        <span class="checkmark"></span>
        Heli/Flugzeug/Boot
      </label>
    </div>

    <div class="input-group">
      <label for="kundenname">Name des Kunden</label>
      <input type="text" id="kundenname" name="name" placeholder="Name">
  </div>
  
  

    <div class="input-group">
      <label>Zuordnung</label>
      <select id="zuordnungSelect">
        <option value="zivilist">Zivilist</option>
        <option value="bennys">Bennys</option>
        <optgroup label="VIP Fraktionen">
        </optgroup>
        <optgroup label="Zivi VIP Kunden Lebenslang">
        </optgroup>
          
        </optgroup>
        <optgroup label="Staatsfraktionen">
          <option value="FIB">FIB</option>
          <option value="MD">MD</option>
          <option value="MD Spezial Unit">MD Spezial Unit</option>
          <option value="PD">PD</option>
          <option value="PD CID">PD CID</option>
          <option value="PD GTF">PD GTF</option>
          <option value="PD Jugular">PD Jugular</option>
          <option value="PD JugularGTF">PD Jugular (Backstep/GTV)</option>
          <option value="PD S.P.F.U">PD S.P.F.U</option>
          <option value="PD SWAT">PD SWAT</option>
          <option value="PD Unmarked">PD Unmarked</option>
          <option value="TMF">TMF</option>
          <option value="TMF Unmarked">TMF Unmarked</option>
        </optgroup>
        <optgroup label="Neutrale Fraktion">
          <option value="bennys">Bennys</option>
          <option value="Unicorn">Unicorn</option>
        </optgroup>
        <optgroup label="Kriminelle Organisation">
          <option value="onepiece">One Piece</option>
          <option value="666">666</option>
        </optgroup>
        <optgroup label="Biker">
          <option value="blood rose mc">Blood Rose MC</option>
          <option value="blood rose mc ug">Blood Rose MC UG</option>
        </optgroup>
        <optgroup label="Gangs">
          <option value="stryx block 069">Stryx Block 069</option>
          <option value="district 67">district 67</option>
        </optgroup>
        <optgroup label="Aufgelöst">
      </select>
      <!-- Neuer Block für die Info-Box -->
      <div id="zuordnungInfo" class="info-box">
        <!-- Info-Inhalt wird hier per Script eingefügt -->
      </div>
    </div>
    <div class="input-group">
      <label>Dienstnummer (falls vorhanden)</label>
      <input type="number" id="dienstnummerkunde" min="0">
    </div>
     
    <div class="dienstnummer-info" aria-hidden="true" style="visibility:hidden;">
  Dienstnummer des Arbeiters:
  </div>
</div>
  

  <div class="middle-column">
    <div class="selection-container">
      <!-- Erste Gruppe -->
      <label class="option-item">
        <input type="checkbox" class="check-box" id="fulltune">
        <span class="checkmark"></span>
        Fulltune
      </label>
  
      <div class="category-gap"></div>
  
      <!-- Zweite Gruppe -->
      <label class="option-item">
        <input type="checkbox" class="check-box" id="primaerfarbe">
        <span class="checkmark"></span>
        Primärfarbe
      </label>
      <label class="option-item">
        <input type="checkbox" class="check-box" id="sekundaerfarbe">
        <span class="checkmark"></span>
        Sekundärfarbe
      </label>
      <!-- Weitere 2 Items -->
      <label class="option-item">
        <input type="checkbox" class="check-box" id="perleffekt">
        <span class="checkmark"></span>
        Perleffekt
      </label>
  </div>
</div>
      <!-- Vor dem Senden-Button in mitarbeiter_1.html -->
      <!-- In deiner Preisliste (wo die 0 steht) -->
  
  <div class="right-column">
    <div class="selection-container">
  
      <!-- Felgen Auswahl -->
      <label class="option-item">
        <input type="checkbox" class="check-box" id="reifenfarbe">
        <span class="checkmark"></span>
        Reifenfarbe
      </label>
      <label class="option-item">
        <input type="checkbox" class="check-box" id="reifenqualm">
        <span class="checkmark"></span>
        Reifenqualm
      </label>
      <label class="option-item">
        <input type="checkbox" class="check-box" id="felgen">
        <span class="checkmark"></span>
        Felgen
      </label>
      <label class="option-item">
        <input type="checkbox" class="check-box" id="unterboden">
        <span class="checkmark"></span>
        Unterboden
      </label>
      <label class="option-item">
        <input type="checkbox" class="check-box" id="xenon">
        <span class="checkmark"></span>
        Xenon-Scheinwerfer
      </label>
      
  
      <!-- Zweite Gruppe -->
      <!-- Weitere 2 Items -->
  
      <div class="category-gap"></div>
  
      <!-- Einzelnes Kästchen -->
      <label class="option-item">
        <input type="checkbox" class="check-box" id="customkennzeichen">
        <span class="checkmark"></span>
        Custom-Kennzeichen
      </label>
  
      <!-- Headlights Dropdown -->
      <div class="headlights-group">
        <span>Headlights:</span>
        <select id="headlights" class="small-select">
          <option value="0">keine</option>
          <option value="1">angebaut + Farbe</option>
          <option value="2">nur Farbe</option>
        </select>
      </div>
  </div>
  </div>
  <div class="bottom-bar">
  <span id="total-price">0</span>
  <button class="send-button" id="sendenButton">Senden</button>  
  </div>
  <script src="script.js"></script>
</body>
</html>
